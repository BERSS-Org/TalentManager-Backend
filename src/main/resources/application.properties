spring.application.name=TalentManager API

server.port=${PORT:8080}
server.address=0.0.0.0
server.forward-headers-strategy=native

# In-memory H2 — clean schema on every start so new fields/types apply immediately.
spring.datasource.url=${DB_URL:jdbc:h2:mem:talentmanager;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:create-drop}
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=com.berss.platform.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy

debug=false
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=INFO

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.flyway.enabled=false

authorization.jwt.secret=${JWT_SECRET:TalentManagerLocalDevelopmentSecretKeyForJwtSigning2026}
authorization.jwt.expiration.days=${JWT_EXPIRATION_DAYS:7}

talentmanager.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}
talentmanager.seed.enabled=${SEED_ENABLED:true}

documentation.application.description=@project.description@
documentation.application.version=@project.version@
