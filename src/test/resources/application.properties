spring.datasource.url=jdbc:h2:mem:talentmanager-test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=false

talentmanager.seed.enabled=false
talentmanager.cors.allowed-origins=http://localhost:4200

authorization.jwt.secret=TalentManagerTestSecretKeyForJwtSigning2026
authorization.jwt.expiration.days=7

debug=false
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=INFO
